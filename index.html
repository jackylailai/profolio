<!doctype html>
<html data-theme="dark" data-attr="lang=meta.lang">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" data-attr="content=meta.description" />
    <meta name="theme-color" content="#060912" />
    <meta property="og:title" data-attr="content=meta.ogTitle" />
    <meta property="og:description" data-attr="content=meta.ogDescription" />
    <meta property="og:type" content="website" />
    <title data-text="meta.title">Loading…</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="fetch" href="content/content.json" crossorigin />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="is-loading">
    <a class="skip-link" href="#main">Skip to content</a>

    <div id="tsparticles" aria-hidden="true"></div>

    <header class="site-header" data-header>
      <nav class="nav shell" aria-label="Primary navigation">
        <a class="brand" href="#top" aria-label="Back to top">
          <span class="brand-mark" data-copy="nav.brand.mark"></span>
          <span class="brand-text" data-copy="nav.brand.text"></span>
        </a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-menu">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" />
          </svg>
          <span class="sr-only">Open menu</span>
        </button>

        <div class="nav-links" id="site-menu" data-list="nav.links" data-item-template="nav-link-template"></div>

        <div class="nav-actions">
          <button class="icon-button" type="button" data-theme-toggle aria-label="Toggle color theme">
            <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 4V2m0 20v-2m8-8h2M2 12h2m14.95 6.95 1.42 1.42M3.63 3.63l1.42 1.42m13.9-1.42-1.42 1.42M3.63 20.37l1.42-1.42"
              />
              <circle cx="12" cy="12" r="4" />
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.7 6.7 0 0 0 9.8 9.8Z" />
            </svg>
          </button>
          <button class="button button-quiet print-button" type="button" data-print>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 8V3h10v5M6 17H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
              <path d="M7 14h10v7H7z" />
            </svg>
            Print
          </button>
        </div>
      </nav>
    </header>

    <main id="main">
      <!-- ==================================================== HERO -->
      <section class="hero" id="top" aria-label="Intro">
        <div class="hero-overlay" aria-hidden="true"></div>
        <div class="hero-content shell">
          <div class="hero-status reveal">
            <span class="dot" aria-hidden="true"></span>
            <span data-copy="hero.status"></span>
          </div>
          <p class="eyebrow reveal reveal-delay-1" data-copy="hero.eyebrow"></p>
          <h1 class="reveal reveal-delay-1" data-copy="hero.title"></h1>
          <p class="hero-lead reveal reveal-delay-2">
            <span data-typed-target data-copy="hero.leadDefault"></span>
          </p>
          <div class="hero-actions reveal reveal-delay-3" data-list="hero.ctas" data-item-template="hero-cta-template"></div>
          <dl
            class="hero-metrics reveal reveal-delay-3"
            aria-label="Highlights"
            data-list="hero.metrics"
            data-item-template="hero-metric-template"
          ></dl>
        </div>
      </section>

      <!-- ==================================================== ABOUT -->
      <section class="section intro-band" id="about">
        <div class="shell">
          <div class="section-heading reveal">
            <p class="section-kicker" data-copy="about.kicker"></p>
            <h2 data-copy="about.title"></h2>
          </div>

          <div class="two-column align-start">
            <div class="rich-copy reveal" data-list="about.paragraphs" data-item-template="rich-paragraph-template"></div>

            <div class="reveal reveal-delay-1">
              <p class="section-kicker" style="margin-bottom: 14px;" data-copy="about.highlightsKicker"></p>
              <div class="highlight-grid" data-list="about.highlights" data-item-template="highlight-card-template"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- ==================================================== RESUME HELPER -->
      <section class="section project-section" id="resume-helper">
        <div class="shell">
          <div class="section-heading compact reveal">
            <p class="section-kicker" data-copy="resumeHelper.kicker"></p>
            <h2 data-copy="resumeHelper.title"></h2>
            <p data-copy="resumeHelper.intro"></p>
          </div>

          <article class="featured-project reveal reveal-delay-1">
            <div class="featured-inner">
              <div class="featured-headline">
                <p class="eyebrow" data-copy="resumeHelper.architecture.eyebrow"></p>
                <h3 data-copy="resumeHelper.architecture.title"></h3>
                <p data-copy="resumeHelper.architecture.description"></p>
                <ul class="featured-meta" data-list="resumeHelper.architecture.stack" data-item-template="featured-stack-template"></ul>

                <div
                  class="architecture"
                  aria-label="Workflow architecture"
                  data-list="resumeHelper.architecture.steps"
                  data-item-template="arch-step-template"
                ></div>

                <div class="featured-cta" data-list="resumeHelper.architecture.ctas" data-item-template="resume-cta-template"></div>
              </div>

              <div class="pillar-grid" data-list="resumeHelper.pillars" data-item-template="pillar-template"></div>
            </div>
          </article>
        </div>
      </section>

      <!-- ==================================================== SKILLS -->
      <section class="section" id="skills">
        <div class="shell">
          <div class="section-heading reveal">
            <p class="section-kicker" data-copy="skills.kicker"></p>
            <h2 data-copy="skills.title"></h2>
            <p data-copy="skills.intro"></p>
          </div>

          <div class="skill-grid" data-list="skills.panels" data-item-template="skill-panel-template"></div>
        </div>
      </section>

      <!-- ==================================================== EXPERIENCE -->
      <section class="section" id="experience">
        <div class="shell two-column align-start">
          <div class="sticky-heading reveal">
            <p class="section-kicker" data-copy="experience.kicker"></p>
            <h2 data-copy="experience.title"></h2>
            <p data-copy="experience.intro"></p>
          </div>

          <div class="timeline" data-list="experience.items" data-item-template="timeline-item-template"></div>
        </div>
      </section>

      <!-- ==================================================== CREDENTIALS -->
      <section class="section certificate-band" id="credentials">
        <div class="shell">
          <div class="section-heading compact reveal">
            <p class="section-kicker" data-copy="credentials.kicker"></p>
            <h2 data-copy="credentials.title"></h2>
          </div>

          <div class="certificate-grid" data-list="credentials.items" data-item-template="credential-card-template"></div>
        </div>
      </section>

      <!-- ==================================================== CONTACT -->
      <section class="section contact-section" id="contact">
        <div class="shell contact-layout">
          <div class="reveal">
            <p class="section-kicker" data-copy="contact.kicker"></p>
            <h2 data-copy="contact.title"></h2>
            <p data-copy="contact.intro"></p>
          </div>
          <div class="contact-actions reveal reveal-delay-1" aria-label="Contact links">
            <div data-list="contact.links" data-item-template="contact-link-template" style="display: contents;"></div>
            <button
              class="button button-quiet"
              type="button"
              data-attr="data-copy-email=contact.copy.value"
              data-copy-email
            >
              <span data-copy="contact.copy.label"></span>
            </button>
            <p class="copy-status" role="status" aria-live="polite" data-copy-status></p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="shell footer-inner">
        <nav class="page-tabs" aria-label="Pages">
          <a class="page-tab is-active" href="#top" aria-current="page">Portfolio</a>
          <a class="page-tab" href="https://jackylailai.github.io/life/">Life</a>
        </nav>
        <p data-copy="footer.copyright"></p>
        <a href="#top">↑ Back to top</a>
      </div>
    </footer>

    <!-- ====== Templates ====== -->
    <template id="nav-link-template">
      <a data-bind-attr="href=href" data-bind="label"></a>
    </template>

    <template id="hero-cta-template">
      <a data-bind-attr="href=href" data-class-from="classes">
        <span data-bind="label"></span>
        <svg viewBox="0 0 24 24" aria-hidden="true" data-if="icon">
          <path d="M5 12h14M13 6l6 6-6 6" />
        </svg>
      </a>
    </template>

    <template id="hero-metric-template">
      <div>
        <dt data-bind="term"></dt>
        <dd data-bind="description"></dd>
      </div>
    </template>

    <template id="rich-paragraph-template">
      <p data-bind="value"></p>
    </template>

    <template id="highlight-card-template">
      <article class="highlight-card">
        <p class="label" data-bind="label"></p>
        <p class="figure" data-bind-html="{title}<span>{sub}</span>"></p>
      </article>
    </template>

    <template id="featured-stack-template">
      <li data-bind="value"></li>
    </template>

    <template id="arch-step-template">
      <div class="step" data-class-from="tone" data-bind-html="{label}<span>{sub}</span>"></div>
    </template>

    <template id="resume-cta-template">
      <a data-bind-attr="href=href,target=target,rel=rel" data-class-from="classes">
        <span data-bind="label"></span>
        <svg viewBox="0 0 24 24" aria-hidden="true" data-if="icon">
          <path d="M7 7h10v10M7 17 17 7" />
        </svg>
      </a>
    </template>

    <template id="pillar-template">
      <div class="pillar">
        <h4 data-bind="title"></h4>
        <p data-bind="body"></p>
      </div>
    </template>

    <template id="skill-panel-template">
      <article class="skill-panel reveal" data-class-from="delay">
        <div class="skill-icon" aria-hidden="true" data-bind-text="icon"></div>
        <h3 data-bind="title"></h3>
        <ul class="tag-list" data-list="tags" data-item-template="skill-tag-template"></ul>
      </article>
    </template>

    <template id="skill-tag-template">
      <li data-bind="value"></li>
    </template>

    <template id="timeline-item-template">
      <article class="timeline-item reveal" data-class-from="delay">
        <div class="timeline-dot" aria-hidden="true"></div>
        <p class="timeline-date" data-bind="date"></p>
        <h3 data-bind="role"></h3>
        <p data-bind="summary"></p>
        <ul data-list="bullets" data-item-template="timeline-bullet-template"></ul>
      </article>
    </template>

    <template id="timeline-bullet-template">
      <li data-bind="value"></li>
    </template>

    <template id="credential-card-template">
      <article class="reveal" data-class-from="delay">
        <span data-bind="index"></span>
        <h3 data-bind="title"></h3>
        <p data-bind="sub" data-if="sub"></p>
      </article>
    </template>

    <template id="contact-link-template">
      <!-- Primary / secondary anchors -->
      <a
        data-if="href"
        data-bind-attr="href=href,target=target,rel=rel"
        data-class-from="classes"
      >
        <span data-bind="label"></span>
        <svg viewBox="0 0 24 24" aria-hidden="true" data-if="icon">
          <path d="M3 7l9 6 9-6M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2" />
        </svg>
      </a>
    </template>

    <!-- ====== CDN libraries (no build) ====== -->
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/engine@3.5.0/tsparticles.engine.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/slim@3.5.0/tsparticles.slim.bundle.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.0.42/dist/lenis.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js" defer></script>

    <!-- ====== Content pipeline ====== -->
    <!-- render.js fetches content.json, hydrates the DOM, then dynamically injects script.js. -->
    <script src="content/render.js" defer></script>
  </body>
</html>
